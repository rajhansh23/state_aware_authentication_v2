<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Slide</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* PERFECT FULLSCREEN BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('intro.png') center center / cover no-repeat;
}

/* OPTIONAL: slight zoom animation for cinematic feel */
@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

.bg {
  animation: zoom 8s ease-in-out infinite alternate;
}
</style>
</head>
<body>

<div class="bg"></div>

</body>
</html>
