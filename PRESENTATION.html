<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>State Aware Authentication System — Full Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0D0F14;--text:#F0EEE8;--muted:#8A8A9A;
  --teal:#00D4A4;--purple:#9B6DFF;--blue:#4DA6FF;
  --amber:#FFB547;--green:#3ECF8E;--red:#FF5A5A;--cyan:#00E5FF;
  --border:rgba(255,255,255,0.08);
}
html,body{width:100%;height:100%;background:#050608;overflow:hidden;font-family:'Space Grotesk',sans-serif;}

/* ── PRESENTATION SHELL ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 50%,#0f1118,#050608);
}

/* ── STAGE ── */
#stage{
  position:relative;
  width:1200px;height:800px;
  overflow:hidden;
  border-radius:10px;
  box-shadow:0 0 0 1px rgba(255,255,255,.06),
             0 30px 80px rgba(0,0,0,.8),
             0 0 60px rgba(155,109,255,.08);
}

/* ── SLIDE IFRAME ── */
.slide-frame{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;opacity:0;pointer-events:none;
  transition:opacity .55s cubic-bezier(.4,0,.2,1),
             transform .55s cubic-bezier(.4,0,.2,1);
  transform:translateX(60px) scale(.97);
  background:var(--bg);
}
.slide-frame.active{opacity:1;pointer-events:all;transform:translateX(0) scale(1);}
.slide-frame.exit-left{opacity:0;transform:translateX(-60px) scale(.97);}
.slide-frame.exit-right{opacity:0;transform:translateX(60px) scale(.97);}

/* ── TOP HUD ── */
#hud{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:1200px;height:44px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:linear-gradient(180deg,rgba(5,6,8,.95),transparent);
  pointer-events:none;
}
.hud-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace;}
.hud-right{display:flex;align-items:center;gap:10px;}
#slide-counter-hud{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);font-family:'JetBrains Mono',monospace;}
.live-pill-hud{display:flex;align-items:center;gap:4px;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--teal);background:rgba(0,212,164,.08);border:1px solid rgba(0,212,164,.2);border-radius:8px;padding:2px 8px;}
.live-dot-hud{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* ── PROGRESS BAR ── */
#progress-track{
  position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
  width:1200px;height:2px;z-index:100;
  background:rgba(255,255,255,.06);border-radius:2px;
}
#progress-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--teal),var(--purple),var(--blue));
  transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(0,212,164,.5);
}

/* ── BOTTOM CONTROLS ── */
#controls{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:1200px;height:64px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:linear-gradient(0deg,rgba(5,6,8,.98),rgba(5,6,8,.6));
}
.ctrl-left,.ctrl-right{display:flex;align-items:center;gap:8px;}
.ctrl-center{display:flex;align-items:center;gap:6px;}

/* nav buttons */
.nav-btn{
  width:38px;height:38px;border-radius:9px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text);
  transition:all .2s;
  font-family:'JetBrains Mono',monospace;
}
.nav-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);transform:scale(1.05);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.nav-btn.primary{background:rgba(0,212,164,.12);border-color:rgba(0,212,164,.3);color:var(--teal);}
.nav-btn.primary:hover{background:rgba(0,212,164,.22);}

/* slide dots */
.slide-dot{
  width:8px;height:8px;border-radius:50%;cursor:pointer;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.08);
  transition:all .25s;flex-shrink:0;
}
.slide-dot.active{background:var(--teal);border-color:rgba(0,212,164,.5);box-shadow:0 0 8px rgba(0,212,164,.4);transform:scale(1.25);}
.slide-dot:hover{background:rgba(255,255,255,.35);}

/* slide name */
#current-name{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.4);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;max-width:280px;text-align:center;}

/* kbd hints */
.kbd-hint{font-size:8px;color:rgba(255,255,255,.2);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px;}
.kbd{display:inline-block;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);}
#fullscreen-btn{
  font-size:12px;padding:0 10px;height:38px;border-radius:9px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  cursor:pointer;color:var(--text);transition:all .2s;
}
#fullscreen-btn:hover{background:rgba(255,255,255,.1);}

/* ── THUMBNAIL PANEL (press T) ── */
#thumb-panel{
  position:fixed;inset:0;z-index:200;
  background:rgba(5,6,8,.96);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  padding:30px;
}
#thumb-panel.open{display:flex;}
.thumb-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;max-width:1100px;}
.thumb-item{
  border-radius:8px;overflow:hidden;cursor:pointer;position:relative;
  border:2px solid rgba(255,255,255,.06);transition:all .2s;
  aspect-ratio:3/2;
}
.thumb-item:hover{border-color:rgba(0,212,164,.5);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5);}
.thumb-item.active{border-color:var(--teal);box-shadow:0 0 16px rgba(0,212,164,.3);}
.thumb-item iframe{width:300%;height:300%;transform:scale(.333);transform-origin:top left;pointer-events:none;border:none;}
.thumb-num{position:absolute;top:4px;left:6px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.5);background:rgba(0,0,0,.5);border-radius:4px;padding:1px 5px;}
.thumb-label{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(0deg,rgba(0,0,0,.8),transparent);font-size:8px;color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.thumb-close-btn{font-size:11px;color:rgba(255,255,255,.4);cursor:pointer;font-family:'JetBrains Mono',monospace;padding:6px 16px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.04);}
.thumb-close-btn:hover{color:var(--text);background:rgba(255,255,255,.08);}

/* ── SLIDE ENTER ANIMATION OVERLAY ── */
#anim-overlay{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:1200px;height:800px;z-index:90;pointer-events:none;
  border-radius:10px;overflow:hidden;
}
.scan-sweep{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
  opacity:0;top:0;
}
.scan-sweep.active{
  animation:sweep-down .6s ease-out forwards;
}
@keyframes sweep-down{0%{top:0;opacity:.8}100%{top:100%;opacity:0}}

/* ── CORNER DECORATIONS ── */
.corner{position:absolute;width:16px;height:16px;z-index:99;}
.corner.tl{top:0;left:0;border-top:2px solid rgba(0,212,164,.4);border-left:2px solid rgba(0,212,164,.4);}
.corner.tr{top:0;right:0;border-top:2px solid rgba(0,212,164,.4);border-right:2px solid rgba(0,212,164,.4);}
.corner.bl{bottom:0;left:0;border-bottom:2px solid rgba(0,212,164,.4);border-left:2px solid rgba(0,212,164,.4);}
.corner.br{bottom:0;right:0;border-bottom:2px solid rgba(0,212,164,.4);border-right:2px solid rgba(0,212,164,.4);}
</style>
</head>
<body>
<div id="app">

  <!-- corner decorations -->
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-title">🔐 State Aware Authentication System · LPU B.Tech CSE</div>
    <div class="hud-right">
      <div class="live-pill-hud"><span class="live-dot-hud"></span>PRESENTATION</div>
      <div id="slide-counter-hud">01 / 10</div>
    </div>
  </div>

  <!-- Stage -->
  <div id="stage">
    <div id="anim-overlay"><div class="scan-sweep" id="scanSweep"></div></div>
    <!-- iframes injected by JS -->
  </div>

  <!-- Progress -->
  <div id="progress-track"><div id="progress-fill" style="width:10%"></div></div>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl-left">
      <button class="nav-btn" id="firstBtn" title="First slide" onclick="goToSlide(0)">⏮</button>
      <button class="nav-btn primary" id="prevBtn" onclick="navigate(-1)">←</button>
      <div class="kbd-hint"><span class="kbd">←</span><span class="kbd">→</span> navigate &nbsp;|&nbsp; <span class="kbd">T</span> overview &nbsp;|&nbsp; <span class="kbd">F</span> fullscreen</div>
    </div>
    <div class="ctrl-center" id="dotsContainer"></div>
    <div class="ctrl-right">
      <div id="current-name">Cover Slide</div>
      <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)">→</button>
      <button class="nav-btn" id="lastBtn" title="Last slide" onclick="goToSlide(slides.length-1)">⏭</button>
      <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Full</button>
    </div>
  </div>

  <!-- Thumbnail panel -->
  <div id="thumb-panel">
    <div class="thumb-grid" id="thumbGrid"></div>
    <div class="thumb-close-btn" onclick="toggleThumb()">✕ Close Overview (T)</div>
  </div>
</div>

<script>
const slides = [
  { file:'slide0_cover.html', name:'Cover' },
  { file:'slide_image.html', name:'Intro Image' },  // 👈 YE ADD KARNA HAI
  { file:'slide1_system_architecture.html', name:'01 · System Architecture' },
  { file:'slide2_system_initialization.html', name:'02 · System Initialization' },
  { file:'slide3_runtime_session.html', name:'03 · Runtime Session' },
  { file:'slide4_tech_stack_ml_pipeline.html', name:'04 · Tech Stack' },
  { file:'slide5_anomaly_detection_risk_scoring.html', name:'05 · Anomaly Detection' },
  { file:'slide6_deployment_architecture.html', name:'06 · Deployment' },
  { file:'slide7_advantages_impact.html', name:'07 · Advantages' },
  { file:'slide8_challenges_vs_solutions.html', name:'08 · Challenges' },
  { file:'slide9_conclusion_future_scope.html', name:'09 · Conclusion' },
  { file:'slide_demo_prototype.html', name:'🛡 Live Demo — AI Security Prototype' }
];

let current = 0;
let transitioning = false;
const stage = document.getElementById('stage');
const frames = [];

// ── BUILD ALL IFRAMES ──
slides.forEach((s, i) => {
  const fr = document.createElement('iframe');
  fr.className = 'slide-frame';
  fr.src = s.file + "?v=" + Date.now();
  fr.id = 'frame-' + i;
  fr.title = s.name;
  stage.appendChild(fr);
  frames.push(fr);
});

// ── BUILD DOTS ──
const dotsEl = document.getElementById('dotsContainer');
slides.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'slide-dot' + (i===0?' active':'');
  d.title = s.name;
  d.onclick = () => goToSlide(i);
  dotsEl.appendChild(d);
});

// ── BUILD THUMBNAILS ──
const thumbGrid = document.getElementById('thumbGrid');
slides.forEach((s, i) => {
  const item = document.createElement('div');
  item.className = 'thumb-item' + (i===0?' active':'');
  item.innerHTML = `
    <iframe src="${s.file}" scrolling="no" tabindex="-1"></iframe>
    <div class="thumb-num">${String(i).padStart(2,'0')}</div>
    <div class="thumb-label">${s.name}</div>
  `;
  item.onclick = () => { goToSlide(i); toggleThumb(); };
  thumbGrid.appendChild(item);
});

// ── ACTIVATE FIRST ──
frames[0].classList.add('active');

function updateUI() {
  // counter
  document.getElementById('slide-counter-hud').textContent =
    String(current+1).padStart(2,'0') + ' / ' + String(slides.length).padStart(2,'0');
  document.getElementById('current-name').textContent = slides[current].name;
  // progress
  document.getElementById('progress-fill').style.width =
    ((current / (slides.length-1)) * 100) + '%';
  // dots
  document.querySelectorAll('.slide-dot').forEach((d,i) => d.classList.toggle('active', i===current));
  // thumbnail actives
  document.querySelectorAll('.thumb-item').forEach((t,i) => t.classList.toggle('active', i===current));
  // buttons
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('firstBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === slides.length-1;
  document.getElementById('lastBtn').disabled = current === slides.length-1;
}

function triggerScanEffect() {
  const sweep = document.getElementById('scanSweep');
  sweep.classList.remove('active');
  void sweep.offsetWidth; // reflow
  sweep.classList.add('active');
}

function goToSlide(idx) {
  if (transitioning || idx === current || idx < 0 || idx >= slides.length) return;
  transitioning = true;

  const direction = idx > current ? 1 : -1;
  const oldFrame = frames[current];
  const newFrame = frames[idx];

  // exit old
  oldFrame.classList.remove('active');
  oldFrame.classList.add(direction > 0 ? 'exit-left' : 'exit-right');

  // prepare new
  function goToSlide(idx) {
  if (transitioning || idx < 0 || idx >= slides.length) return;
  transitioning = true;

  const oldFrame = frames[current];
  const newFrame = frames[idx];

  // reset ALL frames first (important fix)
  frames.forEach(f => {
    f.classList.remove('active','exit-left','exit-right');
    f.style.opacity = '0';
    f.style.transform = 'translateX(60px) scale(0.97)';
  });

  // activate new frame cleanly
  setTimeout(() => {
    newFrame.classList.add('active');
    newFrame.style.opacity = '1';
    newFrame.style.transform = 'translateX(0) scale(1)';

    current = idx;
    updateUI();

    transitioning = false;
  }, 50);
}

  setTimeout(() => {
    newFrame.style.transition = '';
    newFrame.classList.add('active');
    triggerScanEffect();
    current = idx;
    updateUI();

    setTimeout(() => {
      oldFrame.classList.remove('exit-left','exit-right');
      transitioning = false;
    }, 580);
  }, 30);
}

function navigate(dir) { goToSlide(current + dir); }

// keyboard
document.addEventListener('keydown', e => {
  if (document.getElementById('thumb-panel').classList.contains('open')) {
    if (e.key === 'Escape' || e.key.toLowerCase() === 't') toggleThumb();
    return;
  }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); navigate(-1); }
  if (e.key.toLowerCase() === 't') toggleThumb();
  if (e.key.toLowerCase() === 'f') toggleFullscreen();
  if (e.key === 'Home') goToSlide(0);
  if (e.key === 'End')  goToSlide(slides.length-1);
});

function toggleThumb() {
  document.getElementById('thumb-panel').classList.toggle('open');
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

// swipe
let touchX = 0;
stage.addEventListener('touchstart', e => touchX = e.touches[0].clientX, {passive:true});
stage.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
}, {passive:true});

updateUI();

// ── INJECT ENHANCEMENTS INTO IFRAMES ──
// When each frame loads, inject extra animations via postMessage or direct DOM
frames.forEach((fr, idx) => {
  fr.addEventListener('load', () => {
    try {
      const doc = fr.contentDocument;
      if (!doc) return;
      injectEnhancements(doc, idx);
    } catch(e) {}
  });
});

function injectEnhancements(doc, slideIdx) {
  // inject global enhancement CSS
  const style = doc.createElement('style');
  style.textContent = getEnhancementCSS(slideIdx);
  doc.head.appendChild(style);

  // inject global particle canvas
  injectParticles(doc);

  // slide-specific JS enhancements
  const script = doc.createElement('script');
  script.textContent = getEnhancementJS(slideIdx);
  doc.body.appendChild(script);
}

function injectParticles(doc) {
  const canvas = doc.createElement('canvas');
  canvas.id = 'global-particles';
  canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.6;';
  doc.body.insertBefore(canvas, doc.body.firstChild);

  const s = doc.createElement('script');
  s.textContent = `
    (function(){
      const c = document.getElementById('global-particles');
      if(!c) return;
      c.width = 1200; c.height = 800;
      const ctx = c.getContext('2d');
      const pts = Array.from({length:40},()=>({
        x:Math.random()*1200, y:Math.random()*800,
        vx:(Math.random()-.5)*.22, vy:(Math.random()-.5)*.22,
        r:Math.random()*1.2+.3,
        col:['rgba(0,212,164,','rgba(155,109,255,','rgba(77,166,255,'][Math.floor(Math.random()*3)]
      }));
      function tick(){
        ctx.clearRect(0,0,1200,800);
        pts.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy;
          if(p.x<0||p.x>1200)p.vx*=-1;
          if(p.y<0||p.y>800)p.vy*=-1;
          ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle=p.col+'0.45)';ctx.fill();
        });
        requestAnimationFrame(tick);
      }
      tick();
    })();
  `;
  doc.body.appendChild(s);
}

function getEnhancementCSS(idx) {
  const base = `
    /* ── GLOBAL ENHANCEMENTS ── */
    /* hover glow on all cards */
    .svc-card:hover, .bp-panel:hover {
      border-color: rgba(77,166,255,0.35) !important;
      box-shadow: 0 0 16px rgba(77,166,255,0.08) !important;
      transition: all 0.25s !important;
    }
    /* animated entrance for any card-like element */
    @keyframes __fadeSlideIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    /* blinking live indicators */
    @keyframes __livePulse {
      0%,100%{box-shadow:0 0 0 0 rgba(62,207,142,.4)}
      50%{box-shadow:0 0 0 5px rgba(62,207,142,0)}
    }
  `;
  // slide-specific extra CSS
  const extras = {
    1: `
      /* slide 1 – system architecture */
      .layer-card { animation: __fadeSlideIn .5s ease forwards; animation-delay: calc(var(--i,0) * .12s); opacity:0; }
      .header h1 { animation: __fadeSlideIn .6s ease forwards; }
    `,
    2: `
      /* slide 2 – initialization timeline */
      .init-step { animation: __fadeSlideIn .45s ease forwards; animation-delay: calc(var(--i,0) * .1s); opacity:0; }
    `,
    3: `
      /* slide 3 – runtime session */
      .signal-block { animation: __fadeSlideIn .4s ease forwards; }
    `,
    4: `
      /* slide 4 – tech stack */
      .tech-item:hover { transform:translateY(-3px) !important; transition:transform .2s !important; }
    `,
    7: `
      /* slide 7 – advantages */
      .metric-card .m-val {
        animation: __counterReveal 1.2s ease forwards;
      }
      @keyframes __counterReveal {
        from { opacity:0; transform:scale(.7); }
        to   { opacity:1; transform:scale(1); }
      }
      .adv-card { animation:__fadeSlideIn .5s ease forwards; animation-delay:calc(var(--i,0)*.1s); opacity:0; }
    `,
  };
  return base + (extras[idx] || '');
}

function getEnhancementJS(idx) {
  const base = `
    // set --i CSS var on repeated elements for staggered animations
    document.querySelectorAll('.svc-card, .layer-card, .step-card, .init-step, .adv-card, .future-card').forEach((el,i)=>{
      el.style.setProperty('--i', i);
    });
    // add hover micro-interaction to all cards
    document.querySelectorAll('[class*="card"],[class*="panel"],[class*="block"]').forEach(el=>{
      el.addEventListener('mouseenter', ()=>{ el.style.transition='transform .2s'; el.style.transform='translateY(-2px)'; });
      el.addEventListener('mouseleave', ()=>{ el.style.transform=''; });
    });
  `;

  const slideSpecific = {
    // Slide 1: animate flow arrows
    1: `
      // animate layer connections
      const headers = document.querySelectorAll('.layer-header, .col-header');
      headers.forEach((h,i) => {
        h.style.animation = '__fadeSlideIn .5s ease ' + (i*.15) + 's forwards';
        h.style.opacity = '0';
        h.style.animationFillMode = 'forwards';
      });
    `,
    // Slide 2: progress bar animation
    2: `
      // animate init steps one by one
      const steps = document.querySelectorAll('.step, .init-step, .phase-step, [class*="step"]');
      steps.forEach((s,i)=>{
        s.style.opacity='0';
        s.style.transform='translateX(-15px)';
        s.style.transition='opacity .4s, transform .4s';
        setTimeout(()=>{ s.style.opacity='1'; s.style.transform=''; }, 200+i*180);
      });
    `,
    // Slide 3: pulsing nodes
    3: `
      // add pulse to nodes
      document.querySelectorAll('[class*="node"],[class*="signal"],[class*="monitor"]').forEach(el=>{
        el.style.animation='__livePulse 2s infinite';
      });
    `,
    // Slide 5: animate risk meter color
    5: `
      const riskValues = document.querySelectorAll('[class*="score"],[class*="risk"],[class*="meter"]');
      riskValues.forEach(el=>{
        let start = 0;
        const target = parseFloat(el.textContent)||75;
        const timer = setInterval(()=>{
          start = Math.min(start+2, target);
          if(start>=target) clearInterval(timer);
        },30);
      });
    `,
    // Slide 7: counter animation for metric values
    7: `
      function animateCounter(el) {
        const text = el.textContent.trim();
        const num = parseFloat(text.replace(/[^0-9.]/g,''));
        if(isNaN(num)||num===0) return;
        const prefix = text.match(/^[^0-9]*/)?.[0]||'';
        const suffix = text.match(/[^0-9.]*$/)?.[0]||'';
        let cur = 0; const step = num/40;
        const t = setInterval(()=>{
          cur = Math.min(cur+step, num);
          el.textContent = prefix + (Number.isInteger(num)?Math.floor(cur):cur.toFixed(1)) + suffix;
          if(cur>=num) clearInterval(t);
        }, 35);
      }
      setTimeout(()=>{
        document.querySelectorAll('.m-val,.hp-val').forEach(animateCounter);
      }, 400);
    `,
    // Slide 9: staggered fade in for conclusion blocks
    9: `
      const blocks = document.querySelectorAll('.conclusion-block, .future-card, .sys-card');
      blocks.forEach((b,i)=>{
        b.style.opacity='0';
        b.style.transform='translateY(16px)';
        b.style.transition='opacity .5s, transform .5s';
        setTimeout(()=>{ b.style.opacity='1'; b.style.transform=''; }, 150+i*120);
      });
    `,
  };

  return base + (slideSpecific[idx] || '');
}
</script>
</body>
</html>
